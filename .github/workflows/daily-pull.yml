name: daily-oasis-pull

on:
  schedule:
    # 15:20 UTC ≈ 07:20/08:20 Pacific — the newly-eligible bid day publishes overnight
    - cron: "20 15 * * *"
  workflow_dispatch: {}

# Read-only on the repo: bulk data goes to S3, not git.
permissions:
  contents: read

concurrency:
  group: daily-oasis-pull
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # bucket name is not secret; credentials are (encrypted GitHub secrets, never in the repo)
      POWER_DATA_BUCKET: ${{ vars.POWER_DATA_BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-west-1
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Sync pipeline environment
        run: uv sync --project pipeline

      # daily_pull seeds the watermark from S3, pulls new eligible day(s), and
      # pushes the new parquet + advanced watermark back to S3. No repo writes.
      - name: Run incremental pull (S3-backed)
        run: uv run --project pipeline python pipeline/daily_pull.py
