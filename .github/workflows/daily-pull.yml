name: daily-oasis-pull

on:
  schedule:
    # 15:20 UTC ≈ 07:20/08:20 Pacific — the newly-eligible bid day publishes overnight
    - cron: "20 15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-oasis-pull
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Sync pipeline environment
        run: uv sync --project pipeline

      - name: Run incremental pull
        run: uv run --project pipeline python pipeline/daily_pull.py

      - name: Commit new data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed
          if git diff --cached --quiet; then
            echo "no new data"
          else
            WM=$(jq -r '.bids_dam' data/processed/_watermark.json)
            git commit -m "daily pull: bids through ${WM}"
            git pull --rebase origin main
            git push
          fi
