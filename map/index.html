<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAISO Candidate Plant Viewer</title>
    <meta name="description" content="California CAISO power plants — capacity, capacity factor, coast distance, water source" />
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <div class="brand">
          <span class="brand-title">CAISO Candidate Plant Viewer</span>
          <span class="brand-sub" id="countline">loading…</span>
        </div>
        <div class="topbar-actions">
          <button id="view-toggle" class="btn" title="Toggle map / table view">Table</button>
          <button id="theme-toggle" class="btn" title="Toggle light / dark">◐</button>
        </div>
      </header>

      <div id="filterbar">
        <input id="search" type="search" placeholder="Search plant name…" autocomplete="off" />
        <div id="legend" class="chip-group" role="group" aria-label="Category filter"></div>
        <div class="chip-group" id="pm-chips" role="group" aria-label="Prime mover filter"></div>
        <label class="mw-filter">
          <span>Min <b id="mw-label">0</b> MW</span>
          <input id="mw-slider" type="range" min="0" max="3" step="0.05" value="0" />
        </label>
        <label class="check-filter"><input id="coastal" type="checkbox" /> Coastal ≤ 10 km</label>
      </div>

      <main id="content">
        <div id="map" role="application" aria-label="Map of California power plants"></div>
        <div id="table-wrap" hidden>
          <table id="plant-table">
            <thead>
              <tr>
                <th data-k="name">Plant</th><th data-k="mw">MW</th><th data-k="cf">CF 2024</th>
                <th data-k="category">Category</th><th data-k="coast_km">Coast km</th>
                <th data-k="county">County</th><th data-k="water">Water source</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <aside id="detail" hidden></aside>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
